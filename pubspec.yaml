name: mpv_audio_kit
description: "Flutter audio player built on top of libmpv. Supports audio filters, pitch control, equalizer, and all mpv audio features. Targets macOS, Windows, Linux, iOS and Android."
version: 0.0.1+3
homepage: https://github.com/ales-drnz/mpv_audio_kit
repository: https://github.com/ales-drnz/mpv_audio_kit
issue_tracker: https://github.com/ales-drnz/mpv_audio_kit/issues
funding:
  - https://www.patreon.com/ales_drnz

topics:
  - audio
  - player
  - libmpv
  - ffmpeg
  - dsp

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.mpv_audio_kit
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      ios:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      windows:
        ffiPlugin: true

  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
