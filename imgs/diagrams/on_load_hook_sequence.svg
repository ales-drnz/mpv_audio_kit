<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 540" font-family="system-ui, -apple-system, sans-serif" font-size="11" role="img" aria-label="on_load hook during prefetch sequence">
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a8190"/>
    </marker>
  </defs>
  <style>
    .lifeline  { stroke: #c8cdd4; stroke-dasharray: 4,4; stroke-width: 1.2; }
    rect       { fill: #f8f9fb; rx: 8; }
    .name      { font-weight: 700; fill: #1e2329; font-size: 13px; }
    .sub       { fill: #5b6371; font-size: 10.5px; }
    .msg       { stroke: #7a8190; stroke-width: 1.5; fill: none; marker-end: url(#ar3); }
    .edge-text { fill: #5b6371; font-size: 10.5px; }
    .step      { font-weight: 700; fill: #1e2329; font-size: 11px; }
  </style>

  <rect x="20"  y="20" width="140" height="40"/>
  <text class="name" x="90"  y="46" text-anchor="middle">consumer</text>
  <line class="lifeline" x1="90"  y1="60" x2="90"  y2="510"/>

  <rect x="220" y="20" width="140" height="40"/>
  <text class="name" x="290" y="46" text-anchor="middle">wrapper</text>
  <line class="lifeline" x1="290" y1="60" x2="290" y2="510"/>

  <rect x="420" y="20" width="180" height="40"/>
  <text class="name" x="510" y="46" text-anchor="middle">mpv core thread</text>
  <line class="lifeline" x1="510" y1="60" x2="510" y2="510"/>

  <rect x="680" y="20" width="180" height="40"/>
  <text class="name" x="770" y="46" text-anchor="middle">opener thread</text>
  <line class="lifeline" x1="770" y1="60" x2="770" y2="510"/>

  <text class="step" x="20"  y="110">1.</text>
  <text class="edge-text" x="190" y="105" text-anchor="middle">registerHook(Hook.load)</text>
  <path class="msg" d="M90,115 L290,115"/>

  <text class="step" x="20"  y="160">2.</text>
  <text class="edge-text" x="400" y="155" text-anchor="middle">mpv_hook_add(&quot;on_load&quot;)</text>
  <path class="msg" d="M290,165 L510,165"/>

  <text class="step" x="20"  y="210">3.</text>
  <text class="edge-text" x="640" y="215" text-anchor="middle">prefetch_next()</text>
  <path class="msg" d="M510,220 L770,220"/>

  <text class="step" x="20"  y="265">4.</text>
  <text class="edge-text" x="400" y="255" text-anchor="middle">MPV_EVENT_HOOK</text>
  <text class="edge-text" x="400" y="267" text-anchor="middle">name = &quot;on_load&quot;</text>
  <path class="msg" d="M510,275 L290,275"/>

  <text class="step" x="20"  y="320">5.</text>
  <text class="edge-text" x="190" y="310" text-anchor="middle">stream.hook</text>
  <text class="edge-text" x="190" y="322" text-anchor="middle">MpvHookEvent</text>
  <path class="msg" d="M290,330 L90,330"/>

  <text class="step" x="20"  y="375">6.</text>
  <text class="edge-text" x="190" y="365" text-anchor="middle">setRawProperty(</text>
  <text class="edge-text" x="190" y="377" text-anchor="middle">'stream-open-filename', …)</text>
  <path class="msg" d="M90,385 L290,385"/>

  <text class="step" x="20"  y="425">7.</text>
  <text class="edge-text" x="190" y="420" text-anchor="middle">continueHook(event.id)</text>
  <path class="msg" d="M90,430 L290,430"/>

  <text class="edge-text" x="400" y="455" text-anchor="middle">mpv_hook_continue(id)</text>
  <path class="msg" d="M290,465 L510,465"/>

  <text class="step" x="20"  y="500">8.</text>
  <text class="edge-text" x="640" y="490" text-anchor="middle">opener resumes</text>
  <text class="edge-text" x="640" y="502" text-anchor="middle">with rewritten URL</text>
  <path class="msg" d="M510,510 L770,510"/>
</svg>
